# 1. KẾT NỐI DATABASE MYSQL CỦA BOSS
spring.datasource.url=jdbc:mysql://localhost:3306/hethonquanlydiem?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. CẤU HÌNH CHO XÀI HÀM CỦA SPRING DATA JPA (Tự động sinh câu lệnh SQL)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 3. CHỈ ĐƯỜNG CHO ANH PHỤC VỤ (CONTROLLER) TÌM ĐẾN BÀN ĂN (JSP)
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp